<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base UI Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap');

        /* Custom Utility: Glassmorphism */
        .glass {
            @apply bg-white/70 dark:bg-slate-800/50 backdrop-blur-xl border border-slate-200 dark:border-white/10;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-300 bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

<div class="fixed top-6 right-6">
    <button id="themeToggle" class="p-3 rounded-full glass hover:scale-110 transition-transform active:scale-95">
        <i id="themeIcon" data-lucide="moon" class="w-5 h-5 text-slate-600 dark:text-yellow-400"></i>
    </button>
</div>

<div class="w-full max-w-3xl space-y-8">

    <div class="text-center">
        <h1 class="text-4xl font-bold tracking-tight mb-2 text-slate-900 dark:text-white">Application Title</h1>
        <p class="text-slate-500 dark:text-slate-400">Subtext describing the primary action or purpose of this interface.</p>
    </div>

    <div class="glass p-8 rounded-2xl shadow-xl">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input
                        type="text"
                        placeholder="Generic input placeholder..."
                        class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                >
            </div>
            <button class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-xl transition-all flex items-center justify-center gap-2 active:scale-95">
                Primary Action
            </button>
        </div>
    </div>

    <div class="glass rounded-2xl overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-100/50 dark:bg-slate-800/50">
            <span class="text-sm font-medium text-slate-600 dark:text-slate-300 flex items-center gap-2">
                <i data-lucide="layout" class="w-4 h-4 text-blue-500"></i> Output Container
            </span>
            <button class="text-xs flex items-center gap-2 bg-white dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 border border-slate-200 dark:border-transparent px-3 py-1.5 rounded-lg transition-colors">
                Secondary Action
            </button>
        </div>
        <div class="p-6">
            <p class="text-sm text-slate-500 dark:text-slate-400">Content area for results, logs, or data visualization.</p>
        </div>
    </div>
</div>

<script>
    // Lucide Icon Initialization
    lucide.createIcons();

    // Standard Theme Toggle Logic
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    const updateIcon = (isDark) => {
        themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    };

    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
        updateIcon(true);
    }

    themeToggle.addEventListener('click', () => {
        const isDark = html.classList.toggle('dark');
        localStorage.theme = isDark ? 'dark' : 'light';
        updateIcon(isDark);
    });
</script>
</body>
</html>
