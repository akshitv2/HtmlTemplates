<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Inspector Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap');
        .glass {
            @apply bg-white/70 dark:bg-slate-800/50 backdrop-blur-xl border border-slate-200 dark:border-white/10;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-slate-300 dark:bg-slate-700 rounded-full; }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-300 bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

<div class="fixed top-6 right-6">
    <button onclick="toggleTheme()" class="p-3 rounded-full glass hover:scale-110 transition-transform active:scale-95">
        <i id="themeIcon" data-lucide="moon" class="w-5 h-5 text-slate-600 dark:text-yellow-400"></i>
    </button>
</div>

<div class="w-full max-w-5xl space-y-8">
    <div class="text-center">
        <h1 class="text-4xl font-bold tracking-tight mb-2 text-slate-900 dark:text-white">Data Inspector</h1>
        <p class="text-slate-500 dark:text-slate-400">Query your API endpoints and visualize results instantly</p>
    </div>

    <div class="glass p-6 rounded-2xl shadow-xl">
        <form id="apiForm" class="flex flex-col lg:flex-row gap-4">
            <div class="relative flex-[3]">
                <i data-lucide="link-2" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" id="endpoint" placeholder="API Endpoint URL..." required
                       class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <div class="relative flex-1">
                <i data-lucide="tag" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" id="limit" placeholder="Limit"
                       class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            </div>

            <div class="flex gap-2">
                <button type="submit" class="flex-1 lg:flex-none bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-xl transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i data-lucide="search" class="w-4 h-4"></i> Fetch
                </button>
                <button type="button" onclick="clearData()" class="lg:flex-none border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 font-semibold py-3 px-6 rounded-xl transition-all flex items-center justify-center gap-2 active:scale-95">
                    <i data-lucide="trash-2" class="w-4 h-4"></i> Clear
                </button>
            </div>
        </form>
    </div>

    <div id="tableContainer" class="hidden glass rounded-2xl overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-100/50 dark:bg-slate-800/50 flex justify-between items-center">
            <span class="text-sm font-medium flex items-center gap-2">
                <i data-lucide="database" class="w-4 h-4 text-blue-500"></i> Query Results
            </span>
            <span id="rowCount" class="text-xs bg-blue-100 dark:bg-blue-900/30 text-blue-600 px-2 py-1 rounded-md">0 records</span>
        </div>
        <div class="overflow-x-auto custom-scrollbar">
            <table class="w-full text-left border-collapse">
                <thead>
                <tr id="tableHeader" class="bg-slate-50/50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider">
                </tr>
                </thead>
                <tbody id="tableBody" class="text-sm divide-y divide-slate-200 dark:divide-slate-800">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    const endpointInput = document.getElementById('endpoint');
    const limitInput = document.getElementById('limit');
    const tableContainer = document.getElementById('tableContainer');

    // Load saved data on init
    window.addEventListener('DOMContentLoaded', () => {
        endpointInput.value = localStorage.getItem('lastEndpoint') || '';
        limitInput.value = localStorage.getItem('lastLimit') || '';
    });

    function toggleTheme() {
        document.documentElement.classList.toggle('dark');
        const icon = document.getElementById('themeIcon');
        const isDark = document.documentElement.classList.contains('dark');
        icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    function clearData() {
        endpointInput.value = '';
        limitInput.value = '';
        localStorage.removeItem('lastEndpoint');
        localStorage.removeItem('lastLimit');
        tableContainer.classList.add('hidden');
        document.getElementById('tableBody').innerHTML = '';
    }

    document.getElementById('apiForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const endpoint = endpointInput.value;
        const limit = limitInput.value;
        const tbody = document.getElementById('tableBody');
        const thead = document.getElementById('tableHeader');

        // Save to localStorage
        localStorage.setItem('lastEndpoint', endpoint);
        localStorage.setItem('lastLimit', limit);

        try {
            const response = await fetch(endpoint);
            const data = await response.json();
            let list = Array.isArray(data) ? data : [data];

            if(limit) list = list.slice(0, parseInt(limit));

            if (list.length === 0) {
                alert("No data found");
                return;
            }

            const keys = Object.keys(list[0]);
            thead.innerHTML = keys.map(key => `<th class="px-6 py-4 font-semibold">${key}</th>`).join('');

            tbody.innerHTML = list.map(item => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                    ${keys.map(key => `
                        <td class="px-6 py-4 whitespace-nowrap text-slate-600 dark:text-slate-300">
                            ${typeof item[key] === 'object' ? JSON.stringify(item[key]).substring(0,20)+'...' : item[key]}
                        </td>
                    `).join('')}
                </tr>
            `).join('');

            document.getElementById('rowCount').innerText = `${list.length} records`;
            tableContainer.classList.remove('hidden');
        } catch (err) {
            alert("Fetch failed. Ensure URL is correct and allows CORS.");
        }
    });
</script>
</body>
</html>
