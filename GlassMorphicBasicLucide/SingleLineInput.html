<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Inspector Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Configure Tailwind to use 'class' for dark mode
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap');

        /* Dynamic Glass Effect */
        .glass {
            @apply bg-white/70 dark:bg-slate-800/50 backdrop-blur-xl border border-slate-200 dark:border-white/10;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 transition-colors duration-300 bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

<div class="fixed top-6 right-6">
    <button id="themeToggle" class="p-3 rounded-full glass hover:scale-110 transition-transform active:scale-95">
        <i id="themeIcon" data-lucide="moon" class="w-5 h-5 text-slate-600 dark:text-yellow-400"></i>
    </button>
</div>

<div class="w-full max-w-3xl space-y-8">
    <div class="text-center">
        <h1 class="text-4xl font-bold tracking-tight mb-2 text-slate-900 dark:text-white">Path Inspector</h1>
        <p class="text-slate-500 dark:text-slate-400">Enter a server-side file path to retrieve metadata</p>
    </div>

    <div class="glass p-8 rounded-2xl shadow-xl dark:shadow-2xl">
        <form id="pathForm" class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <i data-lucide="folder" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input
                        type="text"
                        id="filePath"
                        placeholder="/var/www/data/config.json"
                        required
                        class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                >
            </div>
            <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-xl transition-all flex items-center justify-center gap-2 active:scale-95"
            >
                <i data-lucide="send" class="w-4 h-4"></i> Analyze
            </button>
        </form>
    </div>

    <div id="responseContainer" class="hidden glass rounded-2xl overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700 bg-slate-100/50 dark:bg-slate-800/50">
                <span class="text-sm font-medium text-slate-600 dark:text-slate-300 flex items-center gap-2">
                    <i data-lucide="terminal" class="w-4 h-4 text-blue-500"></i> Server Response
                </span>
            <button
                    onclick="copyToClipboard()"
                    id="copyBtn"
                    class="text-xs flex items-center gap-2 bg-white dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 border border-slate-200 dark:border-transparent px-3 py-1.5 rounded-lg transition-colors"
            >
                <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy JSON
            </button>
        </div>
        <pre id="jsonOutput" class="font-mono p-6 text-sm overflow-x-auto text-blue-600 dark:text-blue-300 leading-relaxed"></pre>
    </div>
</div>

<script>
    // --- Theme Logic ---
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    // Initialize theme from local storage or system preference
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
        updateIcon(true);
    } else {
        html.classList.remove('dark');
        updateIcon(false);
    }

    themeToggle.addEventListener('click', () => {
        const isDark = html.classList.toggle('dark');
        localStorage.theme = isDark ? 'dark' : 'light';
        updateIcon(isDark);
    });

    function updateIcon(isDark) {
        themeIcon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
        lucide.createIcons();
    }

    // --- Original Logic ---
    lucide.createIcons();

    const form = document.getElementById('pathForm');
    const container = document.getElementById('responseContainer');
    const output = document.getElementById('jsonOutput');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const path = document.getElementById('filePath').value;
        output.textContent = "Processing...";
        container.classList.remove('hidden');

        try {
            // Mocking a response
            const data = {
                status: "success",
                timestamp: new Date().toISOString(),
                path_queried: path,
                details: { size: "2.4MB", permissions: "755", owner: "admin" }
            };
            output.textContent = JSON.stringify(data, null, 4);
        } catch (error) {
            output.textContent = "Error: Could not connect to the server.";
            output.classList.add('text-red-500');
        }
    });

    async function copyToClipboard() {
        const text = output.textContent;
        const btn = document.getElementById('copyBtn');
        try {
            await navigator.clipboard.writeText(text);
            btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!`;
            lucide.createIcons();
            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy JSON`;
                lucide.createIcons();
            }, 2000);
        } catch (err) { console.error('Failed to copy!', err); }
    }
</script>
</body>
</html>
