<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Diff Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap');
        .glass { @apply bg-white/70 dark:bg-slate-800/50 backdrop-blur-xl border border-slate-200 dark:border-white/10; }
        .diff-highlight { @apply bg-red-500/20 text-red-600 dark:text-red-400 font-bold border-l-4 border-red-500 pl-2; }
        textarea { resize: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { @apply bg-slate-300 dark:bg-slate-700 rounded-full; }
    </style>
</head>

<body class="h-screen overflow-hidden flex flex-col bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-300">

<header class="p-4 flex justify-between items-center shrink-0">
    <div class="flex items-center gap-3">
        <div class="p-2 bg-blue-600 rounded-lg text-white">
            <i data-lucide="layers" class="w-6 h-6"></i>
        </div>
        <h1 class="text-xl font-bold tracking-tight">JSON Diff Studio</h1>
    </div>
    <button id="themeToggle" class="p-2.5 rounded-full glass hover:scale-110 transition-transform active:scale-95">
        <i id="themeIcon" data-lucide="moon" class="w-5 h-5 text-slate-600 dark:text-yellow-400"></i>
    </button>
</header>

<main class="flex-grow flex flex-col p-4 gap-4 overflow-hidden">
    <div class="grid grid-cols-3 gap-4 shrink-0">
        <input type="text" placeholder="Parameter A" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-2 px-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        <input type="text" placeholder="Parameter B" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-2 px-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
        <input type="text" placeholder="Parameter C" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl py-2 px-4 outline-none focus:ring-2 focus:ring-blue-500 transition-all">
    </div>

    <div class="flex-grow grid grid-cols-4 gap-4 overflow-hidden">
        <div class="flex flex-col glass rounded-2xl overflow-hidden">
            <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700 bg-slate-100/50 dark:bg-slate-800/50 text-xs font-semibold">JSON 1</div>
            <textarea id="json1" class="flex-grow p-4 bg-transparent font-mono text-sm outline-none" placeholder="Paste JSON here..."></textarea>
        </div>
        <div class="flex flex-col glass rounded-2xl overflow-hidden">
            <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700 bg-slate-100/50 dark:bg-slate-800/50 text-xs font-semibold">JSON 2 (Source)</div>
            <textarea id="json2" class="flex-grow p-4 bg-transparent font-mono text-sm outline-none" placeholder="Paste JSON here..."></textarea>
        </div>
        <div class="flex flex-col glass rounded-2xl overflow-hidden">
            <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700 bg-slate-100/50 dark:bg-slate-800/50 text-xs font-semibold">JSON 3 (Compare)</div>
            <textarea id="json3" class="flex-grow p-4 bg-transparent font-mono text-sm outline-none" placeholder="Paste JSON here..."></textarea>
        </div>
        <div class="flex flex-col glass rounded-2xl overflow-hidden border-blue-500/30">
            <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-700 bg-blue-500/10 text-xs font-semibold flex justify-between">
                <span>OUTPUT</span>
                <button onclick="copyOutput()" class="hover:text-blue-500"><i data-lucide="copy" class="w-3 h-3"></i></button>
            </div>
            <div id="jsonOutput" class="flex-grow p-4 font-mono text-sm overflow-auto whitespace-pre"></div>
        </div>
    </div>

    <div class="flex gap-4 shrink-0 pb-2">
        <button id="clearBtn" class="flex-1 py-3 glass rounded-xl font-semibold hover:text-red-500 transition-all">Clear All</button>
        <button id="submitBtn" class="flex-[2] py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold transition-all">Process & Compare</button>
    </div>
</main>

<script>
    // --- Corrected Theme Logic ---
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    function updateTheme(isDark) {
        if (isDark) {
            html.classList.add('dark');
            themeIcon.setAttribute('data-lucide', 'sun');
        } else {
            html.classList.remove('dark');
            themeIcon.setAttribute('data-lucide', 'moon');
        }
        lucide.createIcons();
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    // Initialize theme
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialDark = savedTheme === 'dark' || (!savedTheme && systemPrefersDark);
    updateTheme(initialDark);

    themeToggle.addEventListener('click', () => {
        updateTheme(!html.classList.contains('dark'));
    });

    // --- JSON Logic ---
    const textareas = ['json1', 'json2', 'json3'];
    let timeout = null;

    textareas.forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                try {
                    if(el.value.trim()) {
                        const obj = JSON.parse(el.value);
                        el.value = JSON.stringify(obj, null, 2);
                    }
                } catch (e) {}
            }, 1000);
        });
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        textareas.forEach(id => document.getElementById(id).value = '');
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('jsonOutput').innerHTML = '';
    });

    document.getElementById('submitBtn').addEventListener('click', () => {
        const outputBox = document.getElementById('jsonOutput');
        const j2 = document.getElementById('json2').value;
        const j3 = document.getElementById('json3').value;

        try {
            const lines2 = JSON.stringify(JSON.parse(j2), null, 2).split('\n');
            const lines3 = JSON.stringify(JSON.parse(j3), null, 2).split('\n');
            outputBox.innerHTML = '';
            lines2.forEach((line, i) => {
                const div = document.createElement('div');
                div.textContent = line;
                if (line !== lines3[i]) div.className = 'diff-highlight';
                outputBox.appendChild(div);
            });
        } catch (e) {
            outputBox.innerHTML = '<span class="text-red-500">Error: Check JSON 2 and 3</span>';
        }
    });

    function copyOutput() {
        navigator.clipboard.writeText(document.getElementById('jsonOutput').innerText);
    }

    lucide.createIcons();
</script>
</body>
</html>
