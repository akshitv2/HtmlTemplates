<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Inspector Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .code-block { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

<div class="w-full max-w-3xl space-y-8">
    <div class="text-center">
        <h1 class="text-4xl font-bold tracking-tight text-white mb-2">Path Inspector</h1>
        <p class="text-slate-400">Enter a server-side file path to retrieve metadata</p>
    </div>

    <div class="glass p-8 rounded-2xl shadow-2xl">
        <form id="pathForm" class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <i data-lucide="folder" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                <input
                        type="text"
                        id="filePath"
                        placeholder="/var/www/data/config.json"
                        required
                        class="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                >
            </div>
            <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-8 rounded-xl transition-all flex items-center justify-center gap-2 active:scale-95"
            >
                <i data-lucide="send" class="w-4 h-4"></i> Analyze
            </button>
        </form>
    </div>

    <div id="responseContainer" class="hidden glass rounded-2xl overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-700 bg-slate-800/50">
                <span class="text-sm font-medium text-slate-300 flex items-center gap-2">
                    <i data-lucide="terminal" class="w-4 h-4 text-blue-400"></i> Server Response
                </span>
            <button
                    onclick="copyToClipboard()"
                    id="copyBtn"
                    class="text-xs flex items-center gap-2 bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg transition-colors"
            >
                <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy JSON
            </button>
        </div>
        <pre id="jsonOutput" class="code-block p-6 text-sm overflow-x-auto text-blue-300 leading-relaxed"></pre>
    </div>
</div>

<script>
    // Initialize Icons
    lucide.createIcons();

    const form = document.getElementById('pathForm');
    const container = document.getElementById('responseContainer');
    const output = document.getElementById('jsonOutput');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const path = document.getElementById('filePath').value;

        // Loading state
        output.textContent = "Processing...";
        container.classList.remove('hidden');

        try {
            // REPLACE THIS URL with your actual API endpoint
            const response = await fetch('/api/inspect', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path })
            });

            // Mocking a response for demonstration since the server doesn't exist yet
            // Delete the lines below and uncomment 'const data = await response.json()' for real use
            const data = {
                status: "success",
                timestamp: new Date().toISOString(),
                path_queried: path,
                details: {
                    size: "2.4MB",
                    permissions: "755",
                    owner: "admin"
                }
            };

            output.textContent = JSON.stringify(data, null, 4);
        } catch (error) {
            output.textContent = "Error: Could not connect to the server.";
            output.classList.add('text-red-400');
        }
    });

    async function copyToClipboard() {
        const text = output.textContent;
        const btn = document.getElementById('copyBtn');
        try {
            await navigator.clipboard.writeText(text);
            btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5"></i> Copied!`;
            btn.classList.add('text-green-400');
            lucide.createIcons();

            setTimeout(() => {
                btn.innerHTML = `<i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy JSON`;
                btn.classList.remove('text-green-400');
                lucide.createIcons();
            }, 2000);
        } catch (err) {
            console.error('Failed to copy!', err);
        }
    }
</script>
</body>
</html>
